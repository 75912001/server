syntax = "proto3";

package _;
option go_package = "server/proto/pb;pb";
import "user.record.proto";

// ===================================================================
// 消息体定义 — 客户端 ↔ Gateway TCP 协议层
// ===================================================================

//0x000001#client->gateway#登录验证-请求
message UserVerifyReq
{
  uint64 uid   = 1;   // 玩家唯一 ID
  string token = 2;   // 登录 Token，供 Online 服校验
}

//0x000002#gateway->client#登录验证-回复
message UserVerifyRes
{
  int64  server_time = 1;   // 服务器当前时间戳，单位毫秒（用于客户端对时）
}

//0x000003#client->gateway#主动下线-请求
message UserOfflineReq
{
  uint32 reason = 1;   // 1=用户主动离线，2=网络异常断开
}

// 0x00000A#client->gateway#心跳-请求
message UserHeartbeatReq {
  uint32 last_session = 1;   // 上次服务端下发的 session，首次心跳填 0
}

// 0x00000B#gateway->client#心跳-回复
message UserHeartbeatRes {
  uint64 server_time  = 1;   // 服务器时间毫秒
  uint32 next_session = 2;   // 客户端下次心跳必须用这个 session（用于防重放）
}

// 0x00000C#client->gateway#请求用户数据-请求
message UserRecordReq {
}

// 0x00000D#gateway->client#请求用户数据-回复
message UserRecordRes {
  UserRecord user_record = 1; // 用户数据
}