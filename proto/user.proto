syntax = "proto3";

package user;
option go_package = "server/proto/pb;pb";
import "user.record.proto";

// ===================================================================
// 消息体定义 — 客户端 ↔ Gateway TCP 协议层
// ===================================================================

//0x000001#client->gateway#登录验证-请求
message UserVerifyReq
{
  uint64 uid = 1; // 用户唯一 ID，由 login 服务下发，客户端登录 gateway 时携带
  string gateway_session = 2; // gatewaySession，由 login 服务下发，客户端登录 gateway 时携带
}

//0x000002#gateway->client#登录验证-回复
message UserVerifyRes
{
  int64  server_time = 1;   // 服务器当前时间戳，单位毫秒（用于客户端对时）
}

//0x000003#client->gateway#主动下线-请求
message UserOfflineReq
{
  uint32 reason = 1;   // 1=用户主动离线
}

//0x00000A#client->gateway#心跳-请求
message UserHeartbeatReq {
  string last_gateway_session = 1;   // 上次 gateway 下发的 gatewaySession
}

//0x00000B#gateway->client#心跳-回复
message UserHeartbeatRes {
  int64 server_time  = 1;   // 服务器时间毫秒
  string next_gateway_session = 2;   // 客户端下次心跳必须用这个 gatewaySession
}

//0x00000C#client->gateway#请求用户数据-请求
message UserRecordReq {
}

//0x00000D#gateway->client#请求用户数据-回复
message UserRecordRes {
  UserRecord user_record = 1; // 用户数据
}

//0x00000E#client->gateway#创建用户-请求
message UserCreateReq
{
}

//0x00000F#gateway->client#创建用户-回复
message UserCreateRes
{
  UserRecord user_record = 1; // 创建成功后的用户数据
}

//0x000010#client->gateway#机器人压测-请求
message RobotPingReq
{
  uint64 seq = 1; // 客户端递增序号
  int64 client_time = 2; // 客户端发送时间戳，单位毫秒
  string payload = 3; // 压测透传数据
}

//0x000011#gateway->client#机器人压测-回复
message RobotPingRes
{
  uint64 seq = 1; // 对应请求中的客户端递增序号
  int64 client_time = 2; // 对应请求中的客户端发送时间戳，单位毫秒
  int64 server_time = 3; // 服务端回复时间戳，单位毫秒
  string payload = 4; // 对应请求中的压测透传数据
}
