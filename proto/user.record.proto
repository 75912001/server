syntax = "proto3";

package user;
option go_package = "server/proto/pb;pb";

message UserRecord {
  uint64 uid = 1; // 用户唯一 ID
  string name = 2; // 用户昵称
  string account = 3; // 登录账号，去除首尾空格后保存，大小写敏感
  int64 account_create_time = 4; // 账号创建时间戳，单位毫秒
  int64 user_create_time = 5; // 用户创建时间戳，单位毫秒；0 表示账号已创建但用户未创建
  map<uint64, uint64> asset_map = 10; // 资产表 key: AssetID value: 数值
  map<uint64, RecordPrimary> record_map = 1000; // 记录表 key: 主要ID
}

// 记录-主要
message RecordPrimary{
  uint64 PrimaryID = 1; // 记录-主要ID
  map<uint64, RecordSecondary> RecordElementMap= 2; // 记录表 key: 记录-次要ID
}

// 记录-次要
message RecordSecondary{
  uint64 SecondaryID = 1; // 记录-副ID
  int64 Timestamp = 2; // 记录-时间戳
  repeated uint64 Data = 3; // 数据-根据记录 PrimaryID/SecondaryID 不同-含义不同
  repeated string StrData = 4; // 记录字符串数据-根据记录 PrimaryID/SecondaryID 不同-含义不同
}
