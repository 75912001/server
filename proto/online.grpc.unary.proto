syntax = "proto3";

package online;
option go_package = "server/proto/pb;pb";
import "options.proto";

message OnlineUserOnlineReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true]; // 路由分片键
  string token = 2;            // 登录 Token，供后端 Online 服校验
  string gateway_key = 3;       // 当前网关的 key，
  string client_ip = 4;        // 客户端真实 IP (防刷、反外挂)
}

message OnlineUserOnlineRes {
  string session = 1;
}

// 用户离线请求 (Gateway -> Online)，网关在 TCP 断开、顶号、主动离线等场景下发出。
message OnlineUserOfflineReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true]; // 离线用户 uid
  uint32 reason = 2;                                 // 离线原因
  string msg = 3;                                    // 离线说明
  string gateway_key = 4;
  string session = 5;
}

message OnlineUserOfflineRes {
}
