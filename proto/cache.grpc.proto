syntax = "proto3";

package cache;
option go_package = "server/proto/pb;pb";
import "options.proto";
import "user.record.proto";

service CacheService {
  option (proto.serviceOpt) = {
    timeout: "3s"
    loadBalancePolicy: LoadBalancePolicy_RingHash
  };

  // todo menglc 使用unary RPC 方式实现，不能保证数据一致性，后续考虑改成stream RPC方式实现，保证数据一致性
  // 写入用户档案。
  // 以 uid 做 RingHash 分片，用户创建和用户资料更新都会走这个接口。
  rpc CacheSetUserRecord(CacheSetUserRecordReq) returns (CacheSetUserRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // todo menglc 使用unary RPC 方式实现，不能保证数据一致性，后续考虑改成stream RPC方式实现，保证数据一致性
  // 读取用户档案。
  // 以 uid 做 RingHash 分片，返回当前 uid 对应的 UserRecord。
  rpc CacheGetUserRecord(CacheGetUserRecordReq) returns (CacheGetUserRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 写入账号级登录 token。
  // 以 account 做 RingHash 分片，token 使用一次性 SETNX 语义，未消费前不覆盖。
  rpc CacheSetAccountVerifyToken(CacheSetAccountVerifyTokenReq) returns (CacheSetAccountVerifyTokenRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_STRING
    };
  }

  // 验证并消费账号级登录 token。
  // 以 account 做 RingHash 分片，消费成功后确保账号存在并返回可信 uid。
  rpc CacheUseAccountVerifyToken(CacheUseAccountVerifyTokenReq) returns (CacheUseAccountVerifyTokenRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_STRING
    };
  }

  // 写入用户在线 session 数据。
  // 以 uid 做 RingHash 分片，用于 online 建立在线态后写入 gateway/online/userSession/gatewaySession 等字段。
  rpc CacheSetUserSessionRecord(CacheSetUserSessionRecordReq) returns (CacheSetUserSessionRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 刷新用户在线 session 过期时间。
  // 以 uid 做 RingHash 分片，仅在 expected_records 匹配稳定 identity 时刷新 TTL。
  rpc CacheSetUserSessionExpire(CacheSetUserSessionExpireReq) returns (CacheSetUserSessionExpireRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 读取用户在线 session 数据。
  // 以 uid 做 RingHash 分片，可按 fields 读取当前在线态中的指定字段。
  rpc CacheGetUserSessionRecord(CacheGetUserSessionRecordReq) returns (CacheGetUserSessionRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 删除用户在线 session 数据。
  // 以 uid 做 RingHash 分片，仅在 expected_records 匹配稳定 identity 时删除。
  rpc CacheDelUserSessionRecord(CacheDelUserSessionRecordReq) returns (CacheDelUserSessionRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 原子替换用户在线 session 数据。
  // 以 uid 做 RingHash 分片，登录替换匹配稳定 identity，心跳更新额外校验 old gatewaySession。
  rpc CacheReplaceUserSessionRecord(CacheReplaceUserSessionRecordReq) returns (CacheReplaceUserSessionRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }
}

enum CacheUserSessionField {
  CacheUserSessionField_Unspecified = 0;
  CacheUserSessionField_GatewayKey = 1;
  CacheUserSessionField_OnlineKey = 2;
  CacheUserSessionField_GatewaySession = 3; // 可轮换认证凭证，客户端心跳后更新。
  CacheUserSessionField_LoginTime = 4;
  CacheUserSessionField_UserSession = 5; // 固定连接身份，一次登录生成，心跳不轮换。
}

message CacheUserSessionRecord {
  CacheUserSessionField field = 1;
  string value = 2;
}

message CacheSetUserRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  user.UserRecord user_record = 2; // 用户数据
}

message CacheSetUserRecordRes {
}

message CacheGetUserRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
}

message CacheGetUserRecordRes {
  user.UserRecord user_record = 1; // 用户数据
}

message CacheSetAccountVerifyTokenReq {
  string account = 1 [(proto.fieldOpt).shardKey = true];
  string token = 2;
  uint64 expire_second = 3;
}

message CacheSetAccountVerifyTokenRes {
}

message CacheUseAccountVerifyTokenReq {
  string account = 1 [(proto.fieldOpt).shardKey = true];
  string token = 2;
}

message CacheUseAccountVerifyTokenRes {
  uint64 uid = 1;
}

message CacheSetUserSessionRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  repeated CacheUserSessionRecord records = 2;
}

message CacheSetUserSessionRecordRes {
}

message CacheSetUserSessionExpireReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  uint64 expire_second = 2;
  repeated CacheUserSessionRecord expected_records = 3;
}

message CacheSetUserSessionExpireRes {
}

message CacheGetUserSessionRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  repeated CacheUserSessionField fields = 2;
}

message CacheGetUserSessionRecordRes {
  repeated CacheUserSessionRecord records = 1;
}

message CacheDelUserSessionRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  repeated CacheUserSessionRecord expected_records = 2;
}

message CacheDelUserSessionRecordRes {
}

message CacheReplaceUserSessionRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  repeated CacheUserSessionRecord expected_records = 2;
  repeated CacheUserSessionRecord records = 3;
  uint64 expire_second = 4;
}

message CacheReplaceUserSessionRecordRes {
}
