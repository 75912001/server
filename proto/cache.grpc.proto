syntax = "proto3";

package cache;
option go_package = "server/proto/pb;pb";
import "options.proto";
import "user.record.proto";

service CacheService {
  option (proto.serviceOpt) = {
    timeout: "3s"
    loadBalancePolicy: LoadBalancePolicy_RingHash
  };

  // todo menglc 使用unary RPC 方式实现，不能保证数据一致性，后续考虑改成stream RPC方式实现，保证数据一致性
  // 写入用户档案。
  // 以 uid 做 RingHash 分片，用户创建和用户资料更新都会走这个接口。
  rpc CacheSetUserRecord(CacheSetUserRecordReq) returns (CacheSetUserRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // todo menglc 使用unary RPC 方式实现，不能保证数据一致性，后续考虑改成stream RPC方式实现，保证数据一致性
  // 读取用户档案。
  // 以 uid 做 RingHash 分片，返回当前 uid 对应的 UserRecord。
  rpc CacheGetUserRecord(CacheGetUserRecordReq) returns (CacheGetUserRecordRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 写入账号级登录 token。
  // 以 account 做 RingHash 分片，token 使用一次性 SETNX 语义，未消费前不覆盖。
  rpc CacheSetAccountVerifyToken(CacheSetAccountVerifyTokenReq) returns (CacheSetAccountVerifyTokenRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_STRING
    };
  }

  // 验证并消费账号级登录 token。
  // 以 account 做 RingHash 分片，消费成功后确保账号存在并返回可信 uid。
  rpc CacheUseAccountVerifyToken(CacheUseAccountVerifyTokenReq) returns (CacheUseAccountVerifyTokenRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_STRING
    };
  }

  // 获取用户在线 session。
  // 以 uid 做 RingHash 分片，返回当前在线态中的 gatewayKey/userSession/loginTime/onlineKey。
  rpc CacheGetUserSession(CacheGetUserSessionReq) returns (CacheGetUserSessionRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 按 expected 创建用户在线 session。
  // 以 uid 做 RingHash 分片，expected 为空时要求当前 session 不存在。
  rpc CacheBeginUserSessionCAS(CacheBeginUserSessionCASReq) returns (CacheBeginUserSessionCASRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 按 expected 结束用户在线 session。
  // 以 uid 做 RingHash 分片，仅在 expected_session.user_session 匹配时删除。
  rpc CacheEndUserSessionCAS(CacheEndUserSessionCASReq) returns (CacheEndUserSessionCASRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }

  // 按 expected 刷新用户在线 session TTL。
  // 以 uid 做 RingHash 分片，仅在 expected_session.user_session 匹配时刷新 TTL。
  rpc CacheRefreshUserSessionCAS(CacheRefreshUserSessionCASReq) returns (CacheRefreshUserSessionCASRes) {
    option (proto.methodOpt) = {
      timeout : "3s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }
}

message CacheSetUserRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  user.UserRecord user_record = 2; // 用户数据
}

message CacheSetUserRecordRes {
}

message CacheGetUserRecordReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
}

message CacheGetUserRecordRes {
  user.UserRecord user_record = 1; // 用户数据
}

message CacheSetAccountVerifyTokenReq {
  string account = 1 [(proto.fieldOpt).shardKey = true];
  string token = 2;
  uint64 expire_second = 3;
}

message CacheSetAccountVerifyTokenRes {
}

message CacheUseAccountVerifyTokenReq {
  string account = 1 [(proto.fieldOpt).shardKey = true];
  string token = 2;
}

message CacheUseAccountVerifyTokenRes {
  uint64 uid = 1;
}

message CacheUserSession {
  string gateway_key = 1;
  string user_session = 2;
  int64 login_time = 3;
  string online_key = 4;
}

message CacheGetUserSessionReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
}

message CacheGetUserSessionRes {
  CacheUserSession session = 1;
}

message CacheBeginUserSessionCASReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  CacheUserSession expected_session = 2;
  CacheUserSession session = 3;
  uint64 expire_second = 4;
}

message CacheBeginUserSessionCASRes {
}

message CacheEndUserSessionCASReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  CacheUserSession expected_session = 2;
}

message CacheEndUserSessionCASRes {
}

message CacheRefreshUserSessionCASReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true];
  CacheUserSession expected_session = 2;
  uint64 expire_second = 3;
}

message CacheRefreshUserSessionCASRes {
}
