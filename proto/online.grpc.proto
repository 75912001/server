syntax = "proto3";

package online;
option go_package = "server/proto/pb;pb";
import "options.proto";
import "online.grpc.unary.proto";

// ===================================================================
// 一、 服务接口定义
// ===================================================================

service OnlineService {
  option (proto.serviceOpt) = {
    timeout: "3s"
    loadBalancePolicy: LoadBalancePolicy_Direct
  };
  // 控制面：绑定用户 actor (Unary RPC)
  // 作用：Gateway 完成票据校验和 session 抢占后，通过此接口通知 Online 建立用户 actor。
  // 特性：Online 只负责绑定用户 actor，不读写在线 session。
  rpc OnlineBindUser(OnlineBindUserReq) returns (OnlineBindUserRes){
    option (proto.methodOpt) = {
      timeout : "10s"
    };
  }
  // 控制面：解绑用户 actor (Unary RPC)
  // 作用：网关在 TCP 断开、顶号、主动离线和回滚等场景下，同步通知 Online 解绑用户 actor。
  rpc OnlineUnbindUser(OnlineUnbindUserReq) returns (OnlineUnbindUserRes) {
    option (proto.methodOpt) = {
      timeout : "10s"
    };
  }
  // 数据面：全互联双向流隧道 (Bidirectional Stream)
  // 作用：承载网关与该 Online 节点之间【所有玩家】的上下行数据。
  // 特性：支持批量打包 (Batching)，极其高效。
  rpc OnlineStreamTunnel (stream OnlineStreamTunnelReq) returns (stream OnlineStreamTunnelRes);
}

// ===================================================================
// 隧道包装器 (实现 Batch 批量吞吐的核心)
// ===================================================================

// 上行请求包装器 (Gateway -> Online)
message OnlineStreamTunnelReq {
  // gateway_id 用于 stream 建立后向 online 注册 gateway 身份
  string gateway_id = 1;
  // 将多个玩家的小帧打包在一起发送，避免单包发送带来的 HTTP/2 帧头与系统调用开销
  repeated OnlineTunnelFrame frames = 2;
}

// 下行响应包装器 (Online -> Gateway)
message OnlineStreamTunnelRes {
  repeated OnlineTunnelFrame frames = 1;
}

// ===================================================================
// 核心数据帧 (利用 oneof 区分业务数据与系统信令)
// ===================================================================

message OnlineTunnelFrame {
  uint64 uid = 1;              // 定位具体的玩家 Actor 或 TCP Socket

  // payload 强互斥：一个 Frame 只能是下面类型之一
  oneof payload {
    // [类型 1] 业务数据-上下行：网关不关心内容的纯游戏数据包
    OnlineClientPacket client_packet = 4;
  }
}

// ===================================================================
// 客户端业务透传包 (适配 TCP Header)
// ===================================================================

message OnlineClientPacket {
  // 这 4 个字段由 Gateway 从 TCP 的 24 字节 Header 中精准切出并赋值
  uint32 message_id = 1;       // 业务指令号 (极其重要，Online 服据此路由到对应 Handler)
  uint32 session_id = 2;       // 会话 ID
  uint32 result_id = 3;        // 结果 ID
  uint64 key = 4;              // 校验/路由 Key

  // 剔除 24 字节包头后，剩下的客户端 Protobuf 二进制流。
  // Gateway 直接原封不动塞进来；Online 服收到后，根据 message_id 将此 body 反序列化为具体的游戏结构体。
  bytes body = 5;
}
