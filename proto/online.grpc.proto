syntax = "proto3";

package _;
option go_package = "server/proto/pb;pb";
import "options.proto";

// ===================================================================
// 一、 服务接口定义
// ===================================================================

service OnlineService {
  option (proto.serviceOpt) = {
    timeout: "3s"
    loadBalancePolicy: LoadBalancePolicy_RingHash
  };
  // 控制面：用户登录鉴权 (Unary RPC)
  // 作用：TCP 刚连接时，网关通过此接口验证 Token。
  // 特性：验证成功后，该连接才被允许进入 StreamTunnel 核心隧道。
  rpc OnlineUserOnline(OnlineUserOnlineReq) returns (OnlineUserOnlineRes){
    option (proto.methodOpt) = {
      timeout : "60s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }
  // 控制面：用户离线 (Unary RPC)
  // 作用：网关在 TCP 断开、顶号、主动离线等场景下，同步通知 Online 清理用户状态。
  rpc OnlineUserOffline(OnlineUserOfflineReq) returns (OnlineUserOfflineRes) {
    option (proto.methodOpt) = {
      timeout : "60s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }
  // 数据面：全互联双向流隧道 (Bidirectional Stream)
  // 作用：承载网关与该 Online 节点之间【所有玩家】的上下行数据。
  // 特性：支持批量打包 (Batching)，极其高效。
  rpc OnlineStreamTunnel (stream OnlineStreamTunnelReq) returns (stream OnlineStreamTunnelRes);
}

// ===================================================================
// 二、 登录请求定义 (控制面)
// ===================================================================

message OnlineUserOnlineReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true]; // 路由分片键，生成器据此产生 selector.Sel 路由代码
  string token = 2;            // 登录 Token，供后端 Online 服校验
  string gateway_id = 3;       // 当前网关的 ID，用于后端记录全局路由 Session
  string client_ip = 4;        // 客户端真实 IP (防刷、反外挂)
}

message OnlineUserOnlineRes {
  uint32 code = 1;             // 0 表示成功，非 0 表示失败
  string msg = 2;              // 错误信息描述
  int64 server_time = 3;       // 服务器当前时间戳，单位毫秒 (用于客户端对时)
}

// ===================================================================
// 三、 隧道包装器 (实现 Batch 批量吞吐的核心)
// ===================================================================

// 上行请求包装器 (Gateway -> Online)
message OnlineStreamTunnelReq {
  // 将多个玩家的小帧打包在一起发送，避免单包发送带来的 HTTP/2 帧头与系统调用开销
  repeated OnlineTunnelFrame frames = 1;
}

// 下行响应包装器 (Online -> Gateway)
message OnlineStreamTunnelRes {
  repeated OnlineTunnelFrame frames = 1;
}

// ===================================================================
// 四、 核心数据帧 (利用 oneof 区分业务数据与系统信令)
// ===================================================================

message OnlineTunnelFrame {
  uint64 uid = 1;              // 定位具体的玩家 Actor 或 TCP Socket

  // payload 强互斥：一个 Frame 只能是下面类型之一
  oneof payload {
    // [类型 1] 业务数据-上下行：网关不关心内容的纯游戏数据包
    OnlineClientPacket client_packet = 4;
  }
}


// ===================================================================
// 五、 系统信令详情
// ===================================================================

// 用户离线请求 (Gateway -> Online)，网关在 TCP 断开、顶号、主动离线等场景下发出。
message OnlineUserOfflineReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true]; // 离线用户 uid
  uint32 reason = 2;                                 // 离线原因
  string msg = 3;                                    // 离线说明
}

message OnlineUserOfflineRes {
  uint32 code = 1; // 0 表示成功；用户已离线也视为成功
  string msg = 2;  // 处理结果说明
}

// ===================================================================
// 六、 客户端业务透传包 (适配 TCP Header)
// ===================================================================

message OnlineClientPacket {
  // 这 4 个字段由 Gateway 从 TCP 的 24 字节 Header 中精准切出并赋值
  uint32 message_id = 1;       // 业务指令号 (极其重要，Online 服据此路由到对应 Handler)
  uint32 session_id = 2;       // 会话 ID
  uint32 result_id = 3;        // 结果 ID
  uint64 key = 4;              // 校验/路由 Key

  // 剔除 24 字节包头后，剩下的客户端 Protobuf 二进制流。
  // Gateway 直接原封不动塞进来；Online 服收到后，根据 message_id 将此 body 反序列化为具体的游戏结构体。
  bytes body = 5;
}
