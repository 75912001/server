syntax = "proto3";

package _;
option go_package = "server/proto/pb;pb";
import "options.proto";

service GatewayService {
  option (proto.serviceOpt) = {
    timeout: "3s"
    loadBalancePolicy: LoadBalancePolicy_RingHash
  };

  // 用户离线
  rpc GatewayUserOffline(GatewayUserOfflineReq) returns (GatewayUserOfflineRes) {
    option (proto.methodOpt) = {
      timeout: "60s"
      shardKeyFieldType: ShardKeyFieldType_UINT64
    };
  }
}

message GatewayUserOfflineReq {
  uint64 uid = 1 [(proto.fieldOpt).shardKey = true]; // 已登录用户 uid；gateway 只从登录完成表 byUID 中查找
  uint32 reason = 2;                                  // 离线原因码
  string msg = 3;                                     // 离线说明
}

message GatewayUserOfflineRes {
  uint32 code = 1; // 0 表示成功；用户已离线也视为成功
  string msg = 2;  // 处理结果说明
}
