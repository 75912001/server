syntax = "proto3";

package gateway;
option go_package = "server/proto/pb;pb";
import "options.proto";

service GatewayService {
  option (proto.serviceOpt) = {
    timeout: "3s"
    loadBalancePolicy: LoadBalancePolicy_Direct
  };

  // 用户离线
  // 调用方：Online 在顶号或清理旧在线状态时，直连旧 Gateway 发起。
  // 作用：Gateway 根据 uid 查找已登录连接并断开。
  rpc GatewayUserOffline(GatewayUserOfflineReq) returns (GatewayUserOfflineRes) {
    option (proto.methodOpt) = {
      timeout: "60s"
    };
  }

  // 准备登录
  // 调用方：Login 在分配 Gateway 后，直连目标 Gateway 发起。
  // 作用：Gateway 在本地 pending 表保存 uid/account/gatewaySession，等待客户端连接验证。
  rpc GatewayPrepareLogin(GatewayPrepareLoginReq) returns (GatewayPrepareLoginRes) {
    option (proto.methodOpt) = {
      timeout: "3s"
    };
  }
}

message GatewayUserOfflineReq {
  uint64 uid = 1;                                    // 已登录用户 uid；gateway 只从登录完成表 byUID 中查找
  uint32 reason = 2;                                  // 离线原因码
  string msg = 3;                                     // 离线说明
}

message GatewayUserOfflineRes {
}

message GatewayPrepareLoginReq {
  uint64 uid = 1;
  string account = 2;
  string gateway_session = 3;
  uint64 expire_second = 4;
}

message GatewayPrepareLoginRes {
}
