name: etcd-cluster

services:
  etcd1:
    image: quay.io/coreos/etcd:v3.6.6
    container_name: etcd1
    command:
      - /usr/local/bin/etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://192.168.71.123:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=etcd-cluster
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=1h
      - --quota-backend-bytes=8589934592
      - --max-request-bytes=10485760
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - ./data/etcd1:/etcd-data
    networks:
      - etcd

  etcd2:
    image: quay.io/coreos/etcd:v3.6.6
    container_name: etcd2
    command:
      - /usr/local/bin/etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://192.168.71.123:22379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=etcd-cluster
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=1h
      - --quota-backend-bytes=8589934592
      - --max-request-bytes=10485760
    ports:
      - "22379:2379"
      - "22380:2380"
    volumes:
      - ./data/etcd2:/etcd-data
    networks:
      - etcd

  etcd3:
    image: quay.io/coreos/etcd:v3.6.6
    container_name: etcd3
    command:
      - /usr/local/bin/etcd
      - --name=etcd3
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://192.168.71.123:32379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd3:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=etcd-cluster
      - --auto-compaction-mode=periodic
      - --auto-compaction-retention=1h
      - --quota-backend-bytes=8589934592
      - --max-request-bytes=10485760
    ports:
      - "32379:2379"
      - "32380:2380"
    volumes:
      - ./data/etcd3:/etcd-data
    networks:
      - etcd

networks:
  etcd:
    name: etcd-cluster
