name: redis-cluster

services:
  redis-cluster:
    image: redis:7
    container_name: redis-cluster
    ports:
      - "7000:7000"
      - "7001:7001"
      - "7002:7002"
      - "7003:7003"
      - "7004:7004"
      - "7005:7005"
      - "17000:17000"
      - "17001:17001"
      - "17002:17002"
      - "17003:17003"
      - "17004:17004"
      - "17005:17005"
    volumes:
      - ./:/redis-cluster
    command:
      - sh
      - -c
      - |
        mkdir -p /redis-cluster/7000/data /redis-cluster/7001/data /redis-cluster/7002/data /redis-cluster/7003/data /redis-cluster/7004/data /redis-cluster/7005/data
        redis-server /redis-cluster/7000/redis.conf &
        redis-server /redis-cluster/7001/redis.conf &
        redis-server /redis-cluster/7002/redis.conf &
        redis-server /redis-cluster/7003/redis.conf &
        redis-server /redis-cluster/7004/redis.conf &
        redis-server /redis-cluster/7005/redis.conf &
        wait
